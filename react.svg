                onClick={() => setSeccion('finetuning')}
                style={{
                  ...ipt,
                  width: 'auto',
                  padding: '7px 16px',
                  cursor: 'pointer',
                  color: C.textMuted,
                }}
              >
                ← Atrás
              </button>
              <button
                onClick={generarReporte}
                style={{
                  ...ipt,
                  width: 'auto',
                  padding: '8px 24px',
                  cursor: 'pointer',
                  background: C.accentDim,
                  border: 'none',
                  color: '#fff',
                  fontWeight: 500,
                  fontSize: 14,
                }}
              >
                🚀 Generar reporte
              </button>
            </div>
          </div>
        )}

        {/* REPORTE */}
        {seccion === 'reporte' && reporte && (
          <div>
            <div
              style={{
                display: 'flex',
                gap: 8,
                flexWrap: 'wrap',
                marginBottom: 14,
              }}
            >
              <button
                onClick={descargarPDF}
                style={{
                  ...ipt,
                  width: 'auto',
                  padding: '8px 18px',
                  cursor: 'pointer',
                  background: '#7C3AED',
                  border: 'none',
                  color: '#fff',
                  fontWeight: 500,
                }}
              >
                📄 Ver / Descargar PDF
              </button>
              {toFinal && (
                <button
                  onClick={enviarCorreo}
                  style={{
                    ...ipt,
                    width: 'auto',
                    padding: '8px 18px',
                    cursor: 'pointer',
                    background: C.accentDim,
                    border: 'none',
                    color: '#fff',
                    fontWeight: 500,
                  }}
                >
                  📧 Abrir en correo
                </button>
              )}
              <button
                onClick={() => enviarSheets(reporte)}
                disabled={guardando}
                style={{
                  ...ipt,
                  width: 'auto',
                  padding: '8px 18px',
                  cursor: 'pointer',
                  background: guardado ? C.success : C.successBg,
                  border: `1px solid ${C.success}`,
                  color: C.success,
                  fontWeight: 500,
                }}
              >
                {guardando
                  ? 'Guardando...'
                  : guardado
                  ? '✓ Guardado en Sheets'
                  : '📊 Guardar en Sheets'}
              </button>
              <button
                onClick={nuevaBitacora}
                style={{
                  ...ipt,
                  width: 'auto',
                  padding: '8px 14px',
                  cursor: 'pointer',
                  color: C.textMuted,
                }}
              >
                Nueva bitácora
              </button>
            </div>
            {errorGuardado && (
              <div
                style={{
                  background: C.dangerBg,
                  border: `1px solid ${C.danger}`,
                  borderRadius: 8,
                  padding: '8px 14px',
                  marginBottom: 12,
                  fontSize: 12,
                  color: C.danger,
                }}
              >
                {errorGuardado}
              </div>
            )}
            <div style={card}>
              <p style={h2s}>🔍 Previsualización del reporte</p>
              <div
                style={{
                  background: C.accentBg,
                  borderRadius: 8,
                  padding: '12px 16px',
                  marginBottom: 12,
                }}
              >
                <div
                  style={{
                    display: 'grid',
                    gridTemplateColumns: '1fr 1fr',
                    gap: 6,
                    fontSize: 13,
                  }}
                >
                  {[
                    ['Fecha', fecha],
                    ['Turno', TURNOS[turno].label + ' — ' + TURNOS[turno].hora],
                    ['Analista saliente', saliente],
                    ['Analista entrante', entrante],
                    ['Supervisor', supervisor],
                    ['Canal', canal],
                    ['Clientes', clientesSel.join(', ') || '—'],
                  ].map(([k, v]) => (
                    <div key={k}>
                      <span style={{ color: C.textMuted, fontSize: 11 }}>
                        {k}:{' '}
                      </span>
                      <span style={{ color: C.text, fontWeight: 500 }}>
                        {v}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
              <div
                style={{
                  display: 'grid',
                  gridTemplateColumns: 'repeat(4,1fr)',
                  gap: 8,
                  marginBottom: 12,
                }}
              >
                {[
                  ['Total', totalAlertas, C.accent],
                  ['Cortex', totalPor('alertasCortex'), '#3B82F6'],
                  ['Jira', totalPor('ticketsJira'), '#10B981'],
                  ['CrowdStrike', totalPor('alertasCrowdStrike'), '#EC4899'],
                ].map(([l, v, c]) => (
                  <div
                    key={l}
                    style={{
                      background: C.surface,
                      borderRadius: 8,
                      padding: '8px',
                      textAlign: 'center',
                      border: `1px solid ${C.cardBorder}`,
                    }}
                  >
                    <div style={{ fontSize: 10, color: C.textMuted }}>{l}</div>
                    <div style={{ fontSize: 18, fontWeight: 500, color: c }}>
                      {v}
                    </div>
                  </div>
                ))}
              </div>
              {metricasConValor() && incidentes.some((inc) => inc.id) && (
                <div style={{ marginBottom: 12 }}>
                  <p
                    style={{
                      fontSize: 12,
                      color: C.textMuted,
                      marginBottom: 6,
                      textTransform: 'uppercase',
                      letterSpacing: '0.05em',
                    }}
                  >
                    Incidentes
                  </p>
                  {incidentes
                    .filter((inc) => inc.id)
                    .map((inc, i) => (
                      <div
                        key={i}
                        style={{
                          display: 'flex',
                          gap: 10,
                          alignItems: 'center',
                          padding: '6px 10px',
                          borderRadius: 6,
                          background: C.surface,
                          marginBottom: 4,
                          border: `1px solid ${C.cardBorder}`,
                        }}
                      >
                        <span
                          style={{
                            fontSize: 11,
                            padding: '2px 8px',
                            borderRadius: 10,
                            background: sevBg(inc.severidad),
                            color: sev(inc.severidad),
                            fontWeight: 500,
                            whiteSpace: 'nowrap',
                          }}
                        >
                          {inc.severidad}
                        </span>
                        <span
                          style={{
                            fontSize: 12,
                            color: C.text,
                            fontWeight: 500,
                          }}
                        >
                          {inc.id}
                        </span>
                        <span style={{ fontSize: 12, color: C.textMuted }}>
                          {inc.cliente}
                        </span>
                        <span
                          style={{
                            fontSize: 12,
                            color: C.textDim,
                            marginLeft: 'auto',
                          }}
                        >
                          {inc.estatus}
                        </span>
                      </div>
                    ))}
                </div>
              )}
              <div>
                <p
                  style={{
                    fontSize: 12,
                    color: C.textMuted,
                    marginBottom: 6,
                    textTransform: 'uppercase',
                    letterSpacing: '0.05em',
                  }}
                >
                  Cuerpo del correo
                </p>
                <div
                  style={{
                    background: C.surface,
                    borderRadius: 8,
                    padding: '12px',
                    fontSize: 12,
                    color: C.text,
                    lineHeight: 1.7,
                    whiteSpace: 'pre-wrap',
                    border: `1px solid ${C.cardBorder}`,
                  }}
                >
                  {cuerpoCorreo || generarCuerpoCorreo(turno, entrante)}
                </div>
                <button
                  onClick={copiarTexto}
                  style={{
                    marginTop: 8,
                    fontSize: 12,
                    padding: '4px 12px',
                    borderRadius: 6,
                    border: `1px solid ${copiado ? C.success : C.inputBorder}`,
                    background: copiado ? C.successBg : C.inputBg,
                    color: copiado ? C.success : C.textMuted,
                    cursor: 'pointer',
                  }}
                >
                  {copiado ? '✓ Copiado' : 'Copiar texto'}
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
