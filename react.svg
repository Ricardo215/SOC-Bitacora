                              const r = new FileReader();
                              r.onload = (ev) =>
                                res({ name: f.name, url: ev.target.result });
                              r.readAsDataURL(f);
                            })
                        );
                        Promise.all(readers).then((imgs) =>
                          updPend(i, 'imagenes', [
                            ...(p.imagenes || []),
                            ...imgs,
                          ])
                        );
                        e.target.value = '';
