  'Actualizar tickets trabajados',
  'Documentar alertas activas',
  'Notificar incidentes relevantes',
  'Verificar estabilidad del entorno',
  'Cerrar sesiones en plataformas',
  'Realizar llenado de la bitácora',
  'Realizar entrega de la bitácora al siguiente turno',
  'Notificar cambio de turno',
];

const emptyInc = () => ({
  id: '',
  analista: '',
  severidad: 'Alta',
  fuente: 'QRadar',
  cliente: '',
  numEventos: '1',
  hostname: '',
  user: '',
  descripcion: '',
  accion: '',
  estatus: 'Abierto',
  siguiente: '',
  fechaHoraLlegada: '',
  fechaHoraEntrega: '',
  tieneRetro: 'No',
  retroalimentacion: '',
  fechaHoraRetro: '',
});
const emptyPend = () => ({
  pendiente: '',
  impacto: '',
  urgencia: 'Alta',
  responsable: 'SOC',
  responsableOtro: '',
  fecha: '',
  hora: '',
  evidencia: '',
  estatus: '',
  comentarios: '',
  imagenes: [],
});
const emptyFT = () => ({
  regla: '',
  fuente: 'QRadar',
  volumen: '',
  descripcion: '',
  repetitivo: 'No',
  recomendacion: 'Tuning',
  accion: '',
  aprobacion: 'No',
  notas: '',
});
const emptyAnalista = () => ({
  nombre: '',
  alertasCortex: '0',
  ticketsJira: '0',
  alertasMemcyco: '0',
  alertasCrowdStrike: '0',
  porCliente: {},
});
const initChecks = (items) =>
  Object.fromEntries(items.map((_, i) => [i, false]));

const C = {
  bg: '#070D1F',
  surface: '#0D1630',
  card: '#111E3A',
  cardBorder: '#1E3060',
  accent: '#2563EB',
  accentDim: '#1E40AF',
  accentBg: '#0F2040',
  text: '#E2E8F0',
  textMuted: '#7B93BC',
  textDim: '#4A6490',
  success: '#059669',
  successBg: '#052E1C',
  danger: '#DC2626',
  dangerBg: '#2D0A0A',
  warn: '#D97706',
  warnBg: '#2D1A02',
  info: '#3B82F6',
  inputBg: '#0A1428',
  inputBorder: '#1E3060',
};

// ── Colores de severidad ──
const sev = (s) =>
  ({ Crítica: '#FF0000', Alta: '#EF4444', Media: '#EAB308', Baja: '#3B82F6' }[
    s
  ] || C.textMuted);
const sevBg = (s) =>
  ({ Crítica: '#3D0000', Alta: '#2D0A0A', Media: '#2D2500', Baja: '#0F2040' }[
    s
  ] || '#1a1a2e');

const LOGO_URL =
  'https://raw.githubusercontent.com/gramirezSOC/fortem-logos/main/Logo%20fortem-012.png';
const LOGO_APP_URL =
  'https://raw.githubusercontent.com/gramirezSOC/fortem-logos/main/Logo%20fortem%20blanco.png';
const FortemLogo = () => (
  <img
    src={LOGO_APP_URL}
    alt=""
    style={{ height: 44, width: 'auto', objectFit: 'contain' }}
  />
);

export default function App() {
  const [turno, setTurno] = useState(0);
  const [fecha, setFecha] = useState(new Date().toISOString().slice(0, 10));
  const [clientesSel, setClientesSel] = useState([]);
  const [saliente, setSaliente] = useState('');
  const [entrante, setEntrante] = useState('');
  const [supervisor, setSupervisor] = useState('');
  const [canal, setCanal] = useState('Personal');
  const [checksI, setChecksI] = useState(initChecks(CHECK_INICIO));
  const [checksC, setChecksC] = useState(initChecks(CHECK_CIERRE));
  const [analistas, setAnalistas] = useState([emptyAnalista()]);
  const [slaRiesgo, setSlaRiesgo] = useState('0');
  const [incConf, setIncConf] = useState('0');
  const [incCont, setIncCont] = useState('0');
  const [eventos, setEventos] = useState('0');
  const [escalados, setEscalados] = useState('0');
  const [incidentes, setIncidentes] = useState([emptyInc()]);
  const [pendientes, setPendientes] = useState([emptyPend()]);
  const [fineTuning, setFineTuning] = useState([emptyFT()]);
  const [entregadoPor, setEntregadoPor] = useState('');
  const [recibidoPor, setRecibidoPor] = useState('');
  const [horaEntrega, setHoraEntrega] = useState('');
  const [horaRecepcion, setHoraRecepcion] = useState('');
  const [cuerpoCorreo, setCuerpoCorreo] = useState('');
  const [notas, setNotas] = useState('');
  const [destinosSel, setDestinosSel] = useState([]);
  const [ccSel, setCcSel] = useState([]);
  const [correoExtraTo, setCorreoExtraTo] = useState('');
  const [correoExtraCc, setCorreoExtraCc] = useState('');
  const [correosExtraTo, setCorreosExtraTo] = useState([]);
  const [correosExtraCc, setCorreosExtraCc] = useState([]);
  const [seccion, setSeccion] = useState('encabezado');
  const [errores, setErrores] = useState([]);
  const [guardando, setGuardando] = useState(false);
  const [guardado, setGuardado] = useState(false);
  const [errorGuardado, setErrorGuardado] = useState('');
  const [copiado, setCopiado] = useState(false);
  const [reporte, setReporte] = useState(null);

  const totalPor = (f) =>
    analistas.reduce((s, a) => s + (parseInt(a[f]) || 0), 0);
  const totalAlertas =
    totalPor('alertasCortex') +
    totalPor('ticketsJira') +
    totalPor('alertasMemcyco') +
    totalPor('alertasCrowdStrike');
  const metricasConValor = () =>
    [incConf, incCont, eventos, escalados, slaRiesgo].some(
      (v) => parseInt(v) > 0
    ) || totalAlertas > 0;
  const pctChecks = (checks) => {
    const t = Object.keys(checks).length;
    const m = Object.values(checks).filter(Boolean).length;
    return Math.round((m / t) * 100);
  };
  const resumenCliente = () => {
    const m = {};
    analistas.forEach((a) =>
      Object.entries(a.porCliente || {}).forEach(([k, v]) => {
        m[k] = (m[k] || 0) + (parseInt(v) || 0);
      })
    );
    return m;
  };

  const generarCuerpoCorreo = (t, ent) => {
    const turnoObj = TURNOS[t || turno];
    const analista = ent || entrante || '[Analista]';
    return (
      turnoObj.saludo +
      ',\n\nSe comparte la bitácora de cambio de turno ' +
      turnoObj.label.toLowerCase() +
      ' al analista ' +
      analista +
      '.\n\nQuedando atento/a a cualquier aclaración que pudiera surgir.\n\nSaludos,\n' +
      (saliente || '[Analista saliente]')
    );
  };

  const toggleCliente = (c) =>
    setClientesSel((p) =>
      p.includes(c) ? p.filter((x) => x !== c) : [...p, c]
    );
  const toggleCheck = (setter, i) => setter((p) => ({ ...p, [i]: !p[i] }));
  const updA = (i, f, v) =>
    setAnalistas((p) => p.map((a, idx) => (idx === i ? { ...a, [f]: v } : a)));
  const updApc = (i, c, v) =>
    setAnalistas((p) =>
      p.map((a, idx) =>
        idx === i ? { ...a, porCliente: { ...a.porCliente, [c]: v } } : a
      )
    );
  const updInc = (i, f, v) =>
    setIncidentes((p) => p.map((x, idx) => (idx === i ? { ...x, [f]: v } : x)));
  const updPend = (i, f, v) =>
    setPendientes((p) => p.map((x, idx) => (idx === i ? { ...x, [f]: v } : x)));
  const updFT = (i, f, v) =>
    setFineTuning((p) => p.map((x, idx) => (idx === i ? { ...x, [f]: v } : x)));

  const toggleDest = (email) =>
    setDestinosSel((p) =>
      p.includes(email) ? p.filter((x) => x !== email) : [...p, email]
    );
  const toggleCc = (email) =>
    setCcSel((p) =>
      p.includes(email) ? p.filter((x) => x !== email) : [...p, email]
    );

  const addExtraTo = () => {
    if (
      correoExtraTo.trim() &&
      !correosExtraTo.includes(correoExtraTo.trim())
    ) {
      setCorreosExtraTo((p) => [...p, correoExtraTo.trim()]);
      setDestinosSel((p) => [...p, correoExtraTo.trim()]);
    }
    setCorreoExtraTo('');
  };
  const addExtraCc = () => {
    if (
      correoExtraCc.trim() &&
      !correosExtraCc.includes(correoExtraCc.trim())
    ) {
      setCorreosExtraCc((p) => [...p, correoExtraCc.trim()]);
      setCcSel((p) => [...p, correoExtraCc.trim()]);
    }
    setCorreoExtraCc('');
  };

  const allDestinosOpts = [
    ...CORREOS_PRINCIPALES,
    ...correosExtraTo.map((e) => ({ email: e, nombre: e.split('@')[0] })),
  ];
  const allCcOpts = [
    ...CORREOS_COMPANEROS,
    ...correosExtraCc.map((e) => ({ email: e, nombre: e.split('@')[0] })),
  ];
  const toFinal = destinosSel.join('; ');
  const ccFinal = ccSel.join(', ');
  const buildAsunto = () =>
    'BITÁCORA CAMBIO DE TURNO - ' +
    TURNOS[turno].label.toUpperCase() +
    ' ' +
    fecha;

  const validar = () => {
    const errs = [];
    if (!fecha) errs.push('Encabezado: falta la fecha.');
    if (!saliente.trim()) errs.push('Encabezado: falta el analista saliente.');
    if (!entrante.trim()) errs.push('Encabezado: falta el analista entrante.');
    if (!supervisor.trim()) errs.push('Encabezado: falta el supervisor/líder.');
    if (clientesSel.length === 0)
      errs.push('Encabezado: selecciona al menos un cliente.');
    if (pctChecks(checksI) < 50)
      errs.push(
        'Checklist: marca al menos el 50% de los ítems de inicio de turno.'
      );
    if (pctChecks(checksC) < 50)
      errs.push(
        'Checklist: marca al menos el 50% de los ítems de cierre de turno.'
      );
    if (analistas.some((a) => !a.nombre.trim()))
      errs.push('Métricas: todos los analistas deben tener nombre.');
    if (metricasConValor()) {
      const vacios = incidentes.filter(
        (inc) => !inc.id.trim() && !inc.descripcion.trim()
      );
      if (incidentes.length === 1 && vacios.length === 1)
        errs.push(
          'Incidentes: hay métricas con valor, debes registrar al menos un incidente.'
        );
      else
        incidentes.forEach((inc, i) => {
          if (!inc.id.trim())
            errs.push('Incidente #' + (i + 1) + ': falta el ID/Case.');
          if (!inc.cliente)
            errs.push('Incidente #' + (i + 1) + ': falta el cliente.');
          if (!inc.descripcion.trim())
            errs.push('Incidente #' + (i + 1) + ': falta la descripción.');
          if (!inc.fechaHoraLlegada)
            errs.push(
              'Incidente #' + (i + 1) + ': falta la fecha/hora de llegada.'
            );
          if (inc.tieneRetro === 'Sí' && !inc.fechaHoraRetro)
            errs.push(
              'Incidente #' +
                (i + 1) +
                ': falta la fecha/hora de la retroalimentación.'
            );
        });
    }
    if (!entregadoPor.trim())
      errs.push('Confirmación: falta el nombre de quien entrega.');
    if (!recibidoPor.trim())
      errs.push('Confirmación: falta el nombre de quien recibe.');
    if (!horaEntrega) errs.push('Confirmación: falta la hora de entrega.');
    if (!horaRecepcion) errs.push('Confirmación: falta la hora de recepción.');
    return errs;
  };

  const buildReporteData = () => ({
    fecha,
    turno: TURNOS[turno].label,
    horario: TURNOS[turno].hora,
    clientes: clientesSel,
    analistaSaliente: saliente,
    analistaEntrante: entrante,
    supervisor,
    canal,
    checkInicioPorc: pctChecks(checksI),
    checkCierrePorc: pctChecks(checksC),
    totalAlertas,
    cortex: totalPor('alertasCortex'),
    jira: totalPor('ticketsJira'),
    memcyco: totalPor('alertasMemcyco'),
    crowdstrike: totalPor('alertasCrowdStrike'),
    incidentesConfirmados: parseInt(incConf) || 0,
    incidentesContenidos: parseInt(incCont) || 0,
    eventosSospechosos: parseInt(eventos) || 0,
    escalados: parseInt(escalados) || 0,
    slaRiesgo: parseInt(slaRiesgo) || 0,
    notasGenerales: notas,
    entregadoPor,
    recibidoPor,
    horaEntrega,
    horaRecepcion,
    analistas: analistas.map((a) => ({
      nombre: a.nombre,
      cortex: parseInt(a.alertasCortex) || 0,
      jira: parseInt(a.ticketsJira) || 0,
      memcyco: parseInt(a.alertasMemcyco) || 0,
      crowdstrike: parseInt(a.alertasCrowdStrike) || 0,
    })),
    alertasPorCliente: resumenCliente(),
    incidentes: incidentes.map((inc) => ({ ...inc })),
    pendientes: pendientes.map((p) => ({ ...p, imagenes: [] })),
    fineTuning: fineTuning.map((f) => ({ ...f })),
  });

  const generarReporte = () => {
    const errs = validar();
    if (errs.length > 0) {
      setErrores(errs);
      setSeccion('errores');
      return;
    }
    setErrores([]);
    setCuerpoCorreo(cuerpoCorreo || generarCuerpoCorreo(turno, entrante));
    setReporte(buildReporteData());
    setSeccion('reporte');
  };

  const enviarSheets = async (data) => {
    setGuardando(true);
    setErrorGuardado('');
    try {
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = APPS_SCRIPT_URL;
      form.target = 'hidden_iframe';
      form.style.display = 'none';
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = 'data';
      input.value = JSON.stringify(data);
      form.appendChild(input);
      const iframe = document.createElement('iframe');
      iframe.name = 'hidden_iframe';
      iframe.style.display = 'none';
      document.body.appendChild(iframe);
      document.body.appendChild(form);
      form.submit();
      setTimeout(() => {
        document.body.removeChild(form);
        document.body.removeChild(iframe);
        setGuardado(true);
        setTimeout(() => setGuardado(false), 4000);
        setGuardando(false);
      }, 2000);
    } catch (e) {
      setErrorGuardado('No se pudo conectar con Google Sheets.');
      setGuardando(false);
    }
  };

  const descargarPDF = () => {
    if (!reporte) return;
    const t = TURNOS[turno];
    const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Bitácora SOC – ${
      t.label
    } ${fecha}</title>
<style>body{font-family:Arial,sans-serif;color:#1a1a2e;font-size:11px;margin:0;padding:20px}.header{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #2563EB;padding-bottom:12px;margin-bottom:16px}h2{font-size:12px;font-weight:bold;color:#fff;background:#0D1630;padding:6px 10px;margin:14px 0 6px;border-radius:4px}h3{font-size:11px;font-weight:bold;color:#1E40AF;margin:10px 0 4px;border-left:3px solid #2563EB;padding-left:8px}table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:10px}th{background:#0D1630;color:#fff;padding:5px 8px;text-align:left}td{padding:4px 8px;border-bottom:1px solid #e0e7ff}tr:nth-child(even) td{background:#f0f4ff}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}.label{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.05em}.value{font-weight:bold}.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:bold}.sev-Crítica{background:#fee2e2;color:#7f0000}.sev-Alta{background:#fecaca;color:#991b1b}.sev-Media{background:#fef9c3;color:#854d0e}.sev-Baja{background:#dbeafe;color:#1e40af}.check-row{display:flex;gap:6px;align-items:center;margin:2px 0;font-size:10px}.total-box{background:#0D1630;color:#fff;padding:10px;border-radius:6px;text-align:center;margin-bottom:10px}.firma{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px}.firma-box{border-top:1px solid #333;padding-top:4px;font-size:9px;color:#555;text-align:center}.footer{margin-top:20px;padding-top:10px;border-top:1px solid #ccc;font-size:9px;color:#888;text-align:center}</style></head><body>
<div class="header"><div><img src="${LOGO_URL}" alt="Fortem Cybersecurity" style="height:50px;width:auto;object-fit:contain"/></div><div style="text-align:right"><div style="font-size:14px;font-weight:bold">Bitácora de Cambio de Turno – SOC</div><div style="font-size:10px;color:#555">${
      t.label
    } | ${t.hora} | ${fecha}</div></div></div>
<h2>Encabezado</h2><div class="grid"><div><div class="label">Clientes</div><div class="value">${
      reporte.clientes.join(', ') || '—'
    }</div></div><div><div class="label">Supervisor</div><div class="value">${
      supervisor || '—'
    }</div></div><div><div class="label">Analista saliente</div><div class="value">${
      saliente || '—'
    }</div></div><div><div class="label">Analista entrante</div><div class="value">${
      entrante || '—'
    }</div></div><div><div class="label">Canal</div><div class="value">${canal}</div></div></div>
<h2>Checklist</h2><div class="grid"><div><h3>Inicio (${pctChecks(
      checksI
    )}%)</h3>${CHECK_INICIO.map(
      (c, i) =>
        `<div class="check-row"><span>${
          checksI[i] ? '✅' : '☐'
        }</span><span>${c}</span></div>`
    ).join('')}</div><div><h3>Cierre (${pctChecks(
      checksC
    )}%)</h3>${CHECK_CIERRE.map(
      (c, i) =>
        `<div class="check-row"><span>${
          checksC[i] ? '✅' : '☐'
        }</span><span>${c}</span></div>`
    ).join('')}</div></div>
<h2>Métricas</h2><div class="total-box">Total alertas: <strong style="font-size:16px">${totalAlertas}</strong></div>
<table><thead><tr><th>Herramienta</th><th>Total</th></tr></thead><tbody><tr><td>Cortex</td><td>${totalPor(
      'alertasCortex'
    )}</td></tr><tr><td>Jira</td><td>${totalPor(
      'ticketsJira'
    )}</td></tr><tr><td>Memcyco</td><td>${totalPor(
      'alertasMemcyco'
    )}</td></tr><tr><td>CrowdStrike</td><td>${totalPor(
      'alertasCrowdStrike'
    )}</td></tr></tbody></table>
${
  metricasConValor()
    ? `<h2>Incidentes</h2><table><thead><tr><th>#</th><th>Analista</th><th>ID</th><th>Cliente</th><th>Severidad</th><th>Eventos</th><th>Hostname</th><th>User</th><th>Descripción</th><th>Estatus</th><th>Llegada</th><th>Entrega</th></tr></thead><tbody>${incidentes
        .map(
          (inc, i) =>
            `<tr><td>${i + 1}</td><td>${inc.analista || '—'}</td><td>${
              inc.id || '—'
            }</td><td>${inc.cliente || '—'}</td><td><span class="badge sev-${
              inc.severidad
            }">${inc.severidad}</span></td><td>${inc.numEventos || 1}</td><td>${
              inc.hostname || '—'
            }</td><td>${inc.user || '—'}</td><td>${
              inc.descripcion || '—'
            }</td><td>${inc.estatus}</td><td>${
              inc.fechaHoraLlegada || '—'
            }</td><td>${inc.fechaHoraEntrega || '—'}</td></tr>`
        )
        .join('')}</tbody></table>`
    : ''
}
${
  pendientes.some((p) => p.pendiente)
    ? `<h2>Pendientes</h2><table><thead><tr><th>Pendiente</th><th>Urgencia</th><th>Responsable</th><th>Fecha/Hora</th><th>Estatus</th></tr></thead><tbody>${pendientes
        .filter((p) => p.pendiente)
        .map(
          (p) =>
            `<tr><td>${p.pendiente}</td><td>${p.urgencia}</td><td>${
              p.responsable === 'Otro' ? p.responsableOtro : p.responsable
            }</td><td>${p.fecha || '—'} ${p.hora || ''}</td><td>${
              p.estatus || '—'
            }</td></tr>`
        )
        .join('')}</tbody></table>`
    : ''
}
${
  notas
    ? `<h2>Notas</h2><p style="font-size:11px;padding:8px;background:#f8f9ff;border-left:3px solid #2563EB;margin:0">${notas}</p>`
    : ''
}
<h2>Confirmación</h2><div class="firma"><div class="firma-box"><strong>${entregadoPor}</strong><br>Analista saliente<br>Hora: ${horaEntrega}</div><div class="firma-box"><strong>${recibidoPor}</strong><br>Analista entrante<br>Hora: ${horaRecepcion}</div></div>
<div class="footer">Generado por Bitácora SOC – Fortem Cybersecurity | ${new Date().toLocaleString(
      'es-MX'
    )}</div>
</body></html>`;
    const w = window.open('', '_blank');
    w.document.write(html);
    w.document.close();
    w.focus();
    setTimeout(() => w.print(), 500);
  };

  const enviarCorreo = () => {
    if (!toFinal) return;
    const asunto = encodeURIComponent(buildAsunto());
    const cuerpo = encodeURIComponent(
      cuerpoCorreo || generarCuerpoCorreo(turno, entrante)
    );
    const to = encodeURIComponent(toFinal);
    const cc = encodeURIComponent(ccFinal);
    window.open(
      'https://mail.google.com/mail/?view=cm&fs=1&to=' +
        to +
        (ccFinal ? '&cc=' + cc : '') +
        '&su=' +
        asunto +
        '&body=' +
        cuerpo,
      '_blank'
    );
  };

  const copiarTexto = () =>
    navigator.clipboard
      .writeText(cuerpoCorreo || generarCuerpoCorreo(turno, entrante))
      .then(() => {
        setCopiado(true);
        setTimeout(() => setCopiado(false), 2000);
      });
  const nuevaBitacora = () => {
