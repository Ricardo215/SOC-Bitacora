const CHECK_INICIO = [
  'Revisión de la bitácora del turno anterior',
  'Informe alertas abiertas',
  'Validar alertas críticas en curso',
  'Acceso a QRadar / SIEM / Cortex / Memcyco /Crowdstrike',
  'Validar listado de falsos positivos',
  'Validar comunicación celular SOC',
  'Proyectar en videowall',
  'Check correo electrónico / WhatsApp Alertas',
];
